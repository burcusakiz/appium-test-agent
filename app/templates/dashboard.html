<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Agent Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            color: #e94560;
        }

        .status {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 4px;
            background: #0f3460;
        }

        .status-item.active {
            background: #0f5132;
            color: #198754;
        }

        .status-item.inactive {
            background: #664d03;
            color: #ffc107;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-item.active .status-dot {
            background: #198754;
            box-shadow: 0 0 5px #198754;
        }

        .status-item.inactive .status-dot {
            background: #dc3545;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .test-panel {
            width: 400px;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .test-panel-header {
            padding: 15px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .test-panel-header h2 {
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #c73e54;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #1a4a8a;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .test-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .test-item {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .test-item:hover {
            border-color: #e94560;
        }

        .test-item.selected {
            border-color: #e94560;
            background: #1a1a3e;
        }

        .test-item.passed {
            border-left: 3px solid #198754;
        }

        .test-item.failed {
            border-left: 3px solid #dc3545;
        }

        .test-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .test-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .test-id {
            font-size: 0.75rem;
            color: #888;
        }

        .test-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .test-status.pass {
            background: #0f5132;
            color: #198754;
        }

        .test-status.fail {
            background: #721c24;
            color: #dc3545;
        }

        .emulator-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            padding: 20px;
        }

        .emulator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #0f3460;
            margin-bottom: 15px;
        }

        .emulator-header h2 {
            font-size: 1rem;
        }

        .refresh-btn {
            background: #0f3460;
            border: none;
            color: #eee;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .emulator-container {
            flex: 1;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #0f3460;
        }

        .emulator-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .loading-screen {
            text-align: center;
            color: #666;
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .log-panel {
            height: 200px;
            margin-top: 20px;
            background: #0d1117;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #0f3460;
        }

        .log-panel-header {
            padding: 10px 15px;
            background: #16213e;
            font-size: 0.85rem;
            border-bottom: 1px solid #0f3460;
        }

        .log-content {
            padding: 15px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .log-entry {
            margin-bottom: 5px;
            white-space: pre-wrap;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }

            .test-panel {
                width: 100%;
                height: 40vh;
            }

            .emulator-panel {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Test Agent Dashboard</h1>
        <div class="status">
            <div class="status-item" id="status-emulator">
                <div class="status-dot"></div>
                <span>Emulator</span>
            </div>
            <div class="status-item" id="status-appium">
                <div class="status-dot"></div>
                <span>Appium</span>
            </div>
            <div class="status-item" id="status-mock">
                <div class="status-dot"></div>
                <span>Mock API</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="test-panel">
            <div class="test-panel-header">
                <h2>Test Senaryolar</h2>
                <div class="actions">
                    <button class="btn btn-primary" id="run-selected" disabled>Run</button>
                    <button class="btn btn-secondary" id="run-all">Run All</button>
                    <button class="btn btn-secondary" id="refresh-status">Update</button>
                </div>
            </div>
            <div class="test-list" id="test-list">
                <div class="loading-screen">
                    <div class="spinner"></div>
                    <p>Loading tests...</p>
                </div>
            </div>
        </div>

        <div class="emulator-panel">
            <div class="emulator-header">
                <h2>Emulator Screen</h2>
                <div>
                    <button class="refresh-btn" id="refresh-screenshot">Refresh</button>
                    <span style="color: #666; font-size: 0.8rem;"><span id="screenshot-time">-</span></span>
                </div>
            </div>

            <div class="emulator-container">
                <img src="" alt="Emulator Screen" class="emulator-image" id="emulator-image">
                <div class="loading-screen" id="loading-screen">
                    <div class="spinner"></div>
                    <p>Getting screenshot...</p>
                </div>
            </div>

            <div class="log-panel">
                <div class="log-panel-header">Test Results</div>
                <div class="log-content" id="log-content">
                    <div class="log-entry" style="color: #666;">Test output will appear here...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedTests = [];
        let logPollInterval = null;
        let screenshotPollInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTests();
            updateStatus();
            loadLatestScreenshot();
            startScreenshotPolling();

            document.getElementById('run-selected').addEventListener('click', runSelectedTests);
            document.getElementById('run-all').addEventListener('click', runAllTests);
            document.getElementById('refresh-status').addEventListener('click', updateStatus);
            document.getElementById('refresh-screenshot').addEventListener('click', loadLatestScreenshot);
        });

        async function loadTests() {
            const testList = document.getElementById('test-list');
            testList.innerHTML = '<div class="loading-screen"><div class="spinner"></div><p>Loading...</p></div>';

            try {
                const tests = [
                    { id: 'TC-001', name: 'Valid Login', path: 'tests/android/login/test_TC001_valid_login.py' },
                    { id: 'TC-002', name: 'Wrong Password', path: 'tests/android/login/test_TC002_wrong_password.py' },
                    { id: 'TC-003', name: 'Empty Credentials', path: 'tests/android/login/test_TC003_empty_credentials.py' },
                    { id: 'TC-004', name: 'Empty Username', path: 'tests/android/login/test_TC004_empty_username.py' },
                    { id: 'TC-005', name: 'Empty Password', path: 'tests/android/login/test_TC005_empty_password.py' },
                    { id: 'TC-006', name: 'UI Elements', path: 'tests/android/login/test_TC006_ui_elements.py' },
                    { id: 'TC-007', name: 'All Elements', path: 'tests/android/login/test_TC007_all_elements.py' },
                    { id: 'TC-008', name: 'Expected Failure', path: 'tests/android/login/test_TC008_expected_failure.py' },
                    { id: 'TC-009', name: 'API Login', path: 'tests/api/test_login_rest.py' },
                ];

                renderTests(tests);
            } catch (error) {
                console.error('Error loading tests:', error);
                testList.innerHTML = '<p style="color: #f85149; padding: 15px;">Load failed</p>';
            }
        }

        function renderTests(tests) {
            const testList = document.getElementById('test-list');
            testList.innerHTML = '';

            tests.forEach(test => {
                const testItem = document.createElement('div');
                testItem.className = 'test-item';
                testItem.dataset.path = test.path;
                testItem.innerHTML = `
                    <div class="test-item-header">
                        <div>
                            <div class="test-name">${test.name}</div>
                            <div class="test-id">${test.id}</div>
                        </div>
                    </div>
                    <div class="test-status" style="display:none;">-</div>
                `;

                testItem.addEventListener('click', () => toggleTestSelection(testItem, test));
                testList.appendChild(testItem);
            });
        }

        function toggleTestSelection(item, test) {
            item.classList.toggle('selected');

            if (item.classList.contains('selected')) {
                selectedTests.push(test);
            } else {
                selectedTests = selectedTests.filter(t => t.id !== test.id);
            }

            document.getElementById('run-selected').disabled = selectedTests.length === 0;
        }

        async function runSelectedTests() {
            if (selectedTests.length === 0) return;
            runTests(selectedTests.map(t => t.path));
        }

        async function runAllTests() {
            const testPaths = Array.from(document.querySelectorAll('.test-item')).map(item => item.dataset.path);
            runTests(testPaths);
        }

        async function runTests(testPaths) {
            if (testPaths.length === 0) {
                logMessage('No tests to run', 'error');
                return;
            }

            const logContent = document.getElementById('log-content');
            logContent.innerHTML = '<div class="log-entry" style="color: #e3b341;">Test running...</div>';

            document.getElementById('run-selected').disabled = true;
            document.getElementById('run-all').disabled = true;

            try {
                const response = await fetch('/api/run-test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tests: testPaths })
                });

                const data = await response.json();
                logMessage(`Started: ${data.tests.length} tests`, 'start');

                selectedTests.forEach(test => {
                    const item = document.querySelector(`.test-item[data-path="${test.path}"]`);
                    if (item) {
                        item.classList.remove('selected');
                    }
                });
                selectedTests = [];

                pollLog();

            } catch (error) {
                logMessage(`Error: ${error.message}`, 'error');
                document.getElementById('run-selected').disabled = false;
                document.getElementById('run-all').disabled = false;
            }
        }

        async function pollLog() {
            const logContent = document.getElementById('log-content');

            const checkLog = async () => {
                try {
                    const response = await fetch('/api/log');
                    const data = await response.json();

                    if (data.running) {
                        logContent.innerHTML = data.log;
                        logContent.scrollTop = logContent.scrollHeight;
                    } else {
                        logContent.innerHTML = data.log;
                        logContent.scrollTop = logContent.scrollHeight;
                        clearInterval(logPollInterval);
                        document.getElementById('run-selected').disabled = selectedTests.length === 0;
                        document.getElementById('run-all').disabled = false;
                        updateStatus();
                    }
                } catch (error) {
                    console.error('Log poll error:', error);
                    clearInterval(logPollInterval);
                    document.getElementById('run-selected').disabled = false;
                    document.getElementById('run-all').disabled = false;
                }
            };

            logPollInterval = setInterval(checkLog, 500);
            checkLog();
        }

        function logMessage(message, type) {
            const logContent = document.getElementById('log-content');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                updateStatusItem('status-emulator', data.emulator);
                updateStatusItem('status-appium', data.appium);
                updateStatusItem('status-mock', data.mock_api);

            } catch (error) {
                console.error('Status update error:', error);
            }
        }

        function updateStatusItem(elementId, status) {
            const element = document.getElementById(elementId);
            if (status === 'running' || status === 'connected') {
                element.className = 'status-item active';
            } else {
                element.className = 'status-item inactive';
            }
        }

        async function loadLatestScreenshot() {
            const img = document.getElementById('emulator-image');
            const loading = document.getElementById('loading-screen');
            const timeSpan = document.getElementById('screenshot-time');

            loading.style.display = 'block';
            img.style.display = 'none';

            try {
                const response = await fetch(`/api/emulator/screenshot?ts=${Date.now()}`);
                if (response.ok) {
                    const blob = await response.blob();
                    img.src = URL.createObjectURL(blob);
                    img.onload = () => {
                        loading.style.display = 'none';
                        img.style.display = 'block';
                        timeSpan.textContent = new Date().toLocaleTimeString();
                    };
                }
            } catch (error) {
                console.error('Screenshot error:', error);
                loading.style.display = 'none';
            }
        }

        // Don't auto-refresh screenshots - only refresh on button click
        // This prevents the flickering effect
        function startScreenshotPolling() {
            // Initial load only, no interval
        }
    </script>
</body>
</html>
