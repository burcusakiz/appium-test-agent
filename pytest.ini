[pytest]
addopts = -v --tb=short --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Quick sanity tests
    regression: Full regression suite
    android: Android UI tests
    api: API tests
    login: Login feature tests
    navigation: Navigation tests
    negative: Negative-path validation tests
    ui: UI visibility and layout tests
    comprehensive: Broad scenario coverage tests

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

norecursedirs = .* __pycache__ .pytest_cache .git reports
