<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Agent Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #1a1a2e;
            padding: 10px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1rem;
            color: #e94560;
            font-weight: 600;
        }

        .status {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            transition: background 0.3s;
        }

        .status-item.active .status-dot {
            background: #198754;
            box-shadow: 0 0 8px rgba(25, 135, 84, 0.5);
        }

        .status-item.inactive .status-dot {
            background: #dc3545;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: calc(100vh - 50px);
            gap: 1px;
            background: #0f3460;
        }

        /* Sidebar - Test Controls */
        .sidebar {
            background: #0d0d16;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .panel {
            background: #161625;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #0f3460;
        }

        .panel h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .test-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .test-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #0d0d16;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #0f3460;
            transition: all 0.2s;
        }

        .test-item:hover {
            border-color: #e94560;
            background: #1a1a2e;
        }

        .test-item.selected {
            border-color: #e94560;
            background: #2a1a2e;
        }

        .test-checkbox {
            width: 18px;
            height: 18px;
            accent-color: #e94560;
            cursor: pointer;
            flex-shrink: 0;
        }

        .test-checkbox:checked {
            border-color: #e94560;
            background: #1a1a2e;
        }

        .test-info {
            flex: 1;
        }

        .test-name {
            font-size: 0.85rem;
            color: #eee;
        }

        .test-id {
            font-size: 0.7rem;
            color: #666;
        }

        .run-controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #c73e54;
        }

        .btn-primary:disabled {
            background: #3a3a5a;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #1a4a8a;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #b02a37;
        }

        .stats {
            display: flex;
            gap: 10px;
        }

        .stat-box {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #0d0d16;
            border-radius: 6px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stat-value.passed { color: #198754; }
        .stat-value.failed { color: #dc3545; }
        .stat-label { font-size: 0.7rem; color: #666; }

        /* Main Stream Area */
        .stream-area {
            background: #000;
            display: flex;
            flex-direction: column;
        }

        .stream-header {
            padding: 10px 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stream-title {
            font-size: 0.85rem;
            color: #e94560;
        }

        .stream-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 0;
        }

        .emulator-container {
            width: 100%;
            max-width: 280px;
            max-height: 420px;
            height: auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .emulator-image {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.15);
            display: none;
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: #666;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .stream-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0,0,0,0.9);
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            z-index: 20;
        }

        .btn-control {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-control.primary {
            background: #e94560;
            color: white;
        }

        .btn-control.primary:hover {
            background: #c73e54;
        }

        .btn-control.primary.active {
            background: #dc3545;
        }

        .status-text {
            color: #888;
            font-size: 0.8rem;
            min-width: 80px;
            text-align: center;
        }

        .status-text.streaming { color: #198754; }

        /* Log Panel */
        .log-panel {
            height: 150px;
            background: #0d0d16;
            border-top: 1px solid #0f3460;
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .log-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
        }

        .log-clear {
            font-size: 0.7rem;
            color: #666;
            cursor: pointer;
            background: none;
            border: none;
            color: #e94560;
        }

        .log-output {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #ccc;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .log-output span.pass {
            color: #198754;
            font-weight: bold;
        }
        .log-output span.fail {
            color: #dc3545;
            font-weight: bold;
        }
        .log-output span.error {
            color: #ff7b72;
            font-weight: bold;
        }
        .log-output span.info {
            color: #58a6ff;
            font-weight: 500;
        }
        .log-output .step-pass {
            color: #198754;
            font-weight: bold;
            background: rgba(25, 135, 84, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .log-output .step-fail {
            color: #dc3545;
            font-weight: bold;
            background: rgba(220, 53, 69, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .log-output .step-info {
            color: #58a6ff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <h1>Test Agent Dashboard</h1>
        <div class="status">
            <div class="status-item" id="status-emulator">
                <div class="status-dot"></div>
                <span>Emulator</span>
            </div>
            <div class="status-item" id="status-appium">
                <div class="status-dot"></div>
                <span>Appium</span>
            </div>
            <div class="status-item" id="status-api">
                <div class="status-dot"></div>
                <span>Mock API</span>
            </div>
        </div>
    </header>

    <div class="main-content">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="panel">
                <h3>Test Senaryoları</h3>
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <button class="btn btn-secondary" id="select-all" style="flex: 1; padding: 6px; font-size: 0.75rem;">Tümünü Seç</button>
                    <button class="btn btn-secondary" id="deselect-all" style="flex: 1; padding: 6px; font-size: 0.75rem;">Tümünü Bırak</button>
                </div>
                <div class="test-list" id="test-list">
                    <!-- Tests will be loaded here -->
                    <div style="padding: 10px; text-align: center; color: #666; font-size: 0.75rem;">Loading...</div>
                </div>
            </div>

            <div class="panel">
                <h3>Test Kontrolü</h3>
                <div class="run-controls">
                    <button class="btn btn-primary" id="run-selected">Çalıştır</button>
                    <button class="btn btn-secondary" id="stop-test" disabled>İptal</button>
                </div>
            </div>

            <div class="panel">
                <h3>Raporlar</h3>
                <div class="test-list" id="reports-list">
                    <!-- Reports will be loaded here -->
                </div>
            </div>
        </aside>

        <!-- Main Stream Area -->
        <main class="stream-area">
            <div class="stream-header">
                <span class="stream-title" id="stream-title">Canlı Emulator Akışı</span>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-value passed" id="stat-passed">0</div>
                        <div class="stat-label">Geçti</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value failed" id="stat-failed">0</div>
                        <div class="stat-label">Başarısız</div>
                    </div>
                </div>
            </div>

            <div class="stream-container">
                <div class="emulator-container" id="emulator-container">
                    <div class="loading-screen" id="loading-screen">
                        <div class="spinner"></div>
                        <p class="loading-text" id="loading-text">Akış başlatılmadı</p>
                    </div>
                    <img src="" alt="Emulator Screen" class="emulator-image" id="emulator-image">
                </div>

                <div class="stream-controls">
                    <button class="btn-control primary" id="stream-toggle">Akışı Başlat</button>
                    <span class="status-text" id="stream-status">Durmuş</span>
                </div>
            </div>

            <!-- Log Panel -->
            <div class="log-panel">
                <div class="log-header">
                    <span class="log-title">Test Logları</span>
                    <button class="log-clear" id="log-clear">Temizle</button>
                </div>
                <div class="log-output" id="log-output">
                    <span class="info">[Sistem Hazır] Dashboard başlatıldı. Test senaryolarını seçip çalıştırabilirsiniz.</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        let screenshotInterval = null;
        let isStreaming = false;
        let testLogs = [];
        let els = {
            testList: null,
            logOutput: null,
        };

        function initDOM() {
            els.testList = document.getElementById('test-list');
            els.logOutput = document.getElementById('log-output');
            els.statusEmulator = document.getElementById('status-emulator');
            els.statusAppium = document.getElementById('status-appium');
            els.statusApi = document.getElementById('status-api');
            els.reportsList = document.getElementById('reports-list');
            els.runSelected = document.getElementById('run-selected');
            els.stopTest = document.getElementById('stop-test');
            els.streamToggle = document.getElementById('stream-toggle');
            els.streamStatus = document.getElementById('stream-status');
            els.emulatorImage = document.getElementById('emulator-image');
            els.loadingScreen = document.getElementById('loading-screen');
            els.logClear = document.getElementById('log-clear');
            els.statPassed = document.getElementById('stat-passed');
            els.statFailed = document.getElementById('stat-failed');
            console.log('DOM elements ready');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDOM();
            setupListeners();
            updateStatus();
            loadTests();
            loadReports();
            setInterval(updateStatus, 5000);
        });

        function log(message, type = 'info') {
            const now = new Date().toLocaleTimeString('tr-TR');
            const colorClass = type === 'pass' ? 'pass' : type === 'fail' ? 'fail' : type === 'error' ? 'error' : 'info';
            const entry = `<span class="${colorClass}">[${now}] ${message}</span>`;
            if (els.logOutput) {
                els.logOutput.innerHTML += entry + '<br>';
                els.logOutput.scrollTop = els.logOutput.scrollHeight;
            } else {
                console.log('[' + now + '] ' + message);
            }
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                const setStatus = (id, value) => {
                    const el = document.getElementById(id);
                    el.classList.remove('active', 'inactive');
                    if (value === 'connected' || value === 'running') {
                        el.classList.add('active');
                    } else {
                        el.classList.add('inactive');
                    }
                };

                setStatus('status-emulator', data.emulator);
                setStatus('status-appium', data.appium);
                setStatus('status-api', data.mock_api);
            } catch (error) {
                console.error('Status update error:', error);
            }
        }

        async function loadTests() {
            try {
                const response = await fetch('/api/tests');
                if (!response.ok) throw new Error('API error: ' + response.status);
                const data = await response.json();

                console.log('loadTests response:', data);

                let tests = [];
                if (Array.isArray(data)) {
                    tests = data;
                } else if (data.tests && Array.isArray(data.tests)) {
                    tests = data.tests;
                } else if (Array.isArray(data)) {
                    tests = data;
                }

                if (tests.length === 0) {
                    els.testList.innerHTML = '<div style="padding: 10px; text-align: center; color: #666; font-size: 0.75rem;">Test yok</div>';
                    return;
                }

                els.testList.innerHTML = tests.map(test => `
                    <div class="test-item" onclick="toggleTestSelection(this, '${test.id}')">
                        <input type="checkbox" class="test-checkbox" id="${test.id}" onclick="event.stopPropagation(); toggleCheckbox(this, '${test.id}')">
                        <div class="test-info">
                            <div class="test-name">${test.name}</div>
                            <div class="test-id">${test.id}</div>
                        </div>
                    </div>
                `).join('');
                log('Test senaryoları yüklendi: ' + tests.length + ' adet', 'info');
            } catch (error) {
                console.error('Load tests error:', error);
                log('Testler yüklenemedi: ' + error.message, 'error');
                els.testList.innerHTML = '<div style="padding: 10px; text-align: center; color: #dc3545; font-size: 0.75rem;">Hata: ' + error.message + '</div>';
            }
        }

        function toggleCheckbox(checkbox, testId) {
            checkbox.checked = !checkbox.checked;
            if (checkbox.checked) {
                checkbox.closest('.test-item').classList.add('selected');
            } else {
                checkbox.closest('.test-item').classList.remove('selected');
            }
        }

        window.toggleTestSelection = function(element, testId) {
            const checkbox = element.querySelector('.test-checkbox');
            if (checkbox) {
                checkbox.checked = !checkbox.checked;
                if (checkbox.checked) {
                    element.classList.add('selected');
                } else {
                    element.classList.remove('selected');
                }
            }
        };

        window.selectAllTests = function() {
            const checkboxes = document.querySelectorAll('.test-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = true;
                cb.closest('.test-item').classList.add('selected');
            });
        };

        window.deselectAllTests = function() {
            const checkboxes = document.querySelectorAll('.test-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = false;
                cb.closest('.test-item').classList.remove('selected');
            });
        };

        window.getSelectedTests = function() {
            const checkboxes = document.querySelectorAll('.test-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.id || cb.closest('.test-item').querySelector('.test-id').textContent);
        };

        async function loadReports() {
            try {
                const response = await fetch('/api/reports/list');
                const data = await response.json();
                if (data.reports.length > 0) {
                    els.reportsList.innerHTML = data.reports.map(r => `
                        <div class="test-item" onclick="viewReport('${r.date}', '${r.path}')">
                            <div class="test-info">
                                <div class="test-name">${r.date}</div>
                                <div class="test-id">${r.passed} geçti, ${r.failed} başarısız</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    els.reportsList.innerHTML = '<div style="padding: 10px; text-align: center; color: #666; font-size: 0.75rem;">Henüz rapor yok</div>';
                }
            } catch (error) {
                console.error('Reports load error:', error);
            }
        }

        window.viewReport = async function(date, path) {
            try {
                const response = await fetch(`/api/reports/${date}/html`);
                const data = await response.json();
                if (data.html) {
                    const reportWin = window.open('', '_blank', 'width=1000,height=800');
                    reportWin.document.write('<html><head><title>Rapor - ' + date + '</title></head><body>' + data.html + '</body></html>');
                    reportWin.document.close();
                    log(`Rapor açıldı: ${date}`, 'info');
                }
            } catch (error) {
                log('Rapor açılamadı', 'error');
            }
        };

        function setupListeners() {
            els.streamToggle.addEventListener('click', () => {
                if (isStreaming) {
                    stopStream();
                } else {
                    startStream();
                }
            });

            els.runSelected.addEventListener('click', async () => {
                const checkboxes = document.querySelectorAll('.test-checkbox:checked');
                console.log('Total checkboxes on page:', document.querySelectorAll('.test-checkbox').length);
                console.log('Checked checkboxes:', checkboxes.length);
                checkboxes.forEach((cb, i) => {
                    console.log(`Checkbox ${i}: id=${cb.id}, checked=${cb.checked}`);
                });
                if (checkboxes.length === 0) {
                    log('Çalıştırılacak test seçilmedi', 'error');
                    return;
                }

                const tests = Array.from(checkboxes).map(cb => {
                    const id = cb.closest('.test-item').querySelector('.test-id').textContent;
                    const name = cb.closest('.test-item').querySelector('.test-name').textContent;
                    return { id, name };
                });

                const selectedIds = tests.map(t => t.id);
                log(`${tests.length} test çalıştırılıyor: ${selectedIds.join(', ')}`, 'info');
                console.log('Selected test IDs:', selectedIds);
                els.runSelected.disabled = true;
                els.stopTest.disabled = false;
                testRunning = true;

                els.logOutput.innerHTML = '';

                try {
                    const response = await fetch('/api/run-test', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tests: tests.map(t => t.id) })
                    });

                    const result = await response.json();
                    if (result.error) {
                        log(`Hata: ${result.error}`, 'error');
                        resetTestUI();
                    } else {
                        startLogPolling();
                    }
                } catch (error) {
                    log('Test başlatma hatası', 'error');
                    resetTestUI();
                }
            });

            els.stopTest.addEventListener('click', () => {
                if (testRunning) {
                    log('Test çalışması iptal ediliyor...', 'error');
                    resetTestUI();
                }
            });

            els.logClear.addEventListener('click', () => {
                els.logOutput.innerHTML = '<span class="info">[Sistem] Log temizlendi</span><br>';
                log('Log paneli temizlendi', 'info');
            });
        }

        function startStream() {
            if (isStreaming) return;

            els.loadingScreen.style.display = 'none';
            els.emulatorImage.style.display = 'block';
            els.emulatorImage.src = '';

            fetchScreenshot();

            els.streamToggle.classList.add('primary', 'active');
            els.streamToggle.textContent = 'Akışı Durdur';
            els.streamStatus.textContent = 'Akıyor...';
            els.streamStatus.classList.add('streaming');

            screenshotInterval = setInterval(fetchScreenshot, 2000);
            isStreaming = true;
            log('Canlı akış başlatıldı', 'info');
        }

        function stopStream() {
            if (screenshotInterval) {
                clearInterval(screenshotInterval);
                screenshotInterval = null;
            }

            // Revoke blob URL to free memory
            if (currentImageBlobUrl) {
                URL.revokeObjectURL(currentImageBlobUrl);
                currentImageBlobUrl = '';
            }

            isStreaming = false;

            els.emulatorImage.style.display = 'none';
            els.loadingScreen.style.display = 'flex';
            document.getElementById('loading-text').textContent = 'Akış durduruldu';
            els.streamToggle.classList.remove('primary', 'active');
            els.streamToggle.textContent = 'Akışı Başlat';
            els.streamStatus.textContent = 'Durmuş';
            els.streamStatus.classList.remove('streaming');
            log('Canlı akış durduruldu', 'info');
        }

        let currentImageBlobUrl = '';
        let testRunning = false;

        function resetTestUI() {
            els.runSelected.disabled = false;
            els.stopTest.disabled = true;
            testRunning = false;
        }

        async function fetchScreenshot() {
            try {
                const response = await fetch(`/api/emulator/screenshot?ts=${Date.now()}`);
                if (response.ok) {
                    const blob = await response.blob();
                    const newUrl = URL.createObjectURL(blob);

                    // Revoke old blob URL to prevent memory leaks
                    if (currentImageBlobUrl) {
                        URL.revokeObjectURL(currentImageBlobUrl);
                    }

                    // Update with new URL
                    els.emulatorImage.src = newUrl;
                    currentImageBlobUrl = newUrl;
                }
            } catch (error) {
                console.error('Screenshot fetch error:', error);
            }
        }

        let logPollInterval;
        let lastLogLength = 0;

        function startLogPolling() {
            if (logPollInterval) clearInterval(logPollInterval);
            logPollInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/log');
                    const data = await response.json();
                    if (data.log) {
                        const newLog = data.log.substring(lastLogLength);
                        if (newLog) {
                            els.logOutput.innerHTML += newLog.replace(/\n/g, '<br>');
                            els.logOutput.scrollTop = els.logOutput.scrollHeight;
                            lastLogLength = data.log.length;
                        }
                    }

                    if (typeof data.passed === 'number' || typeof data.failed === 'number') {
                        els.statPassed.textContent = data.passed || 0;
                        els.statFailed.textContent = data.failed || 0;
                    }

                    if (!data.running) {
                        clearInterval(logPollInterval);
                        log('Test çalışması tamamlandı', 'pass');
                        resetTestUI();
                        deselectAllTests();  // Deselect all tests after completion
                        await loadReports();  // Refresh reports list
                    }
                } catch (error) {
                    console.error('Log poll error:', error);
                }
            }, 1000);
        }
    </script>
</body>
</html>
